<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PUK OS | Profile</title>
  <link rel="stylesheet" href="./css/style.css" />
  <link rel="stylesheet" href="./css/themes/dark.css" id="themeStylesheet" />
</head>
<body>
  <div class="background-layer" aria-hidden="true">
    <span class="shape shape-1"></span>
    <span class="shape shape-2"></span>
    <span class="shape shape-3"></span>
  </div>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-icon">PUK</div>
        <div>
          <h1>PUK OS</h1>
          <p>Futuristic workspace</p>
        </div>
      </div>
      <nav class="nav-menu">
        <a class="nav-link" href="./index.html">Dashboard</a>
        <a class="nav-link" href="./games.html">Games</a>
        <a class="nav-link" href="./ai.html">AI Tools</a>
        <a class="nav-link" href="./calculator.html">Calculator</a>
        <a class="nav-link" href="./chat.html">Group Chat</a>
        <a class="nav-link" href="./profile.html">Profile</a>
        <a class="nav-link" href="./settings.html">Settings</a>
      </nav>
    </aside>
    <main class="main-panel">
      <header class="topbar">
        <div class="topbar-left">
          <h1 class="page-title">Profile</h1>
        </div>
        <div class="topbar-right">
          <div class="user-preview">
            <span class="user-badge">PU</span>
            <div>
              <p class="user-name">Guest</p>
              <small class="user-subtitle">Profile persistence enabled.</small>
            </div>
          </div>
        </div>
      </header>
      <section class="page-shell profile-grid">
        <div class="glass-panel profile-card">
          <div class="avatar-preview-wrap">
            <img id="profilePreviewImage" class="profile-image hidden" alt="Profile preview" />
            <div class="avatar-large" id="profileAvatar">PU</div>
          </div>
          <h2 id="profileCardName">Guest Explorer</h2>
          <p id="profileCardBio">Your profile is ready for customization.</p>
          <small>Member since <span id="profileJoinDate">Today</span></small>
        </div>
        <div class="glass-panel settings-card">
          <div class="panel-label">Personalize</div>
          <label>
            Display name
            <input id="profileNameInput" type="text" placeholder="Enter your name" />
          </label>
          <label>
            Bio
            <textarea id="profileBioInput" rows="4" placeholder="Share your story"></textarea>
          </label>
          <label>
            Profile picture
            <input id="profilePictureInput" type="file" accept="image/*" />
          </label>
          <button class="primary-btn" id="saveProfileBtn">Save profile</button>
        </div>
      </section>
    </main>
  </div>

  <script type="module" src="./js/common.js"></script>
  <script type="module" src="./js/profile-page.js"></script>
</body>
</html>
